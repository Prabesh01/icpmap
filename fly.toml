# fly.toml app configuration file generated for icpmap on 2026-06-30T12:11:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'icpmap'
primary_region = 'iad'

[build]

[processes]
  app = 'python web/main.py'
  
[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
